openapi: 3.0.3
info:
  title: GeoCell API
  version: 1.0.0
  description: Endpoints de autenticação e administração para GeoCell.

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
  - name: Departments
  - name: Users
  - name: Cells

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Efetuar login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login com sucesso
          headers:
            Set-Cookie:
              description: Cookie de sessão
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '413':
          description: Ficheiro demasiado grande
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Efetuar logout
      security:
        - SessionCookieAuth: []
      responses:
        '204':
          description: Logout com sucesso
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Obter utilizador autenticado
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Utilizador autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/departments:
    get:
      tags: [Departments]
      summary: Listar departamentos
      description: Requer utilizador autenticado com perfil superuser.
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Lista de departamentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DepartmentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    post:
      tags: [Departments]
      summary: Criar departamento
      description: Requer utilizador autenticado com perfil superuser.
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentRequest'
      responses:
        '201':
          description: Departamento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /api/users:
    get:
      tags: [Users]
      summary: Listar utilizadores
      description: Requer utilizador autenticado com perfil superuser.
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Lista de utilizadores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    post:
      tags: [Users]
      summary: Criar utilizador
      description: Requer utilizador autenticado com perfil superuser.
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Utilizador criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Obter utilizador por ID
      description: Requer utilizador autenticado com perfil superuser.
      security:
        - SessionCookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Utilizador encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/cells:
    get:
      tags: [Cells]
      summary: Obter cells por CGI
      description: Procura no campo `cgi` ou `paragon_cgi`.
      security:
        - SessionCookieAuth: []
      parameters:
        - name: cgi
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cells encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CellResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    post:
      tags: [Cells]
      summary: Criar cell
      description: Cria/associa tabelas relacionadas e gera `polygon` e `polygon_short`.
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CellUpsertRequest'
      responses:
        '201':
          description: Cell criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CellResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /api/cells/nearby:
    get:
      tags: [Cells]
      summary: Obter cells vizinhas num raio
      description: Procura cells num círculo em torno de uma cell central identificada por CGI.
      security:
        - SessionCookieAuth: []
      parameters:
        - name: cgi
          in: query
          required: true
          schema:
            type: string
        - name: radiusKm
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: 0
            exclusiveMinimum: true
        - name: sameNetwork
          in: query
          required: false
          description: Quando `1`/`true`, filtra apenas cells com o mesmo MNC da cell central.
          schema:
            type: string
            enum: ['0', '1', 'false', 'true']
        - name: techGeneration
          in: query
          required: false
          description: Pode ser repetido ou enviado em CSV (`2G,4G,NB-IoT`).
          schema:
            type: array
            items:
              type: string
              enum: [2G, 3G, 4G, 5G, NB-IoT]
          style: form
          explode: true
      responses:
        '200':
          description: Polygon da central e polygon_short das cells no raio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyCellsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/cells/import:
    post:
      tags: [Cells]
      summary: Importar cells via CSV
      description: Importa um ficheiro `.csv` de cells, criando/atualizando registos e respeitando timestamps por data da linha.
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Importação concluída
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CellCsvImportResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/cells/{id}:
    put:
      tags: [Cells]
      summary: Atualizar cell por ID
      security:
        - SessionCookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CellUpsertRequest'
      responses:
        '200':
          description: Cell atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CellResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

    delete:
      tags: [Cells]
      summary: Remover cell por ID
      security:
        - SessionCookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Cell removida
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  securitySchemes:
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: session_key

  responses:
    ValidationError:
      description: Pedido inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Sem permissões para a operação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflito de dados
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          maxLength: 150
        password:
          type: string
          maxLength: 128

    AuthUserResponse:
      type: object
      required:
        - id
        - username
        - name
        - email
        - roles
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
          uniqueItems: true

    CreateDepartmentRequest:
      type: object
      required:
        - name
        - haveOperations
      properties:
        name:
          type: string
          maxLength: 150
        haveOperations:
          type: boolean

    DepartmentResponse:
      type: object
      required:
        - id
        - name
        - haveOperations
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        haveOperations:
          type: boolean

    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - name
        - email
        - departmentId
      properties:
        username:
          type: string
          maxLength: 150
        password:
          type: string
          maxLength: 128
        name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        departmentId:
          type: integer
          format: int64
        isSuperuser:
          type: boolean
          default: false
        isAnalyst:
          type: boolean
          default: false
        isOperationAdmin:
          type: boolean
          default: false
        mapType:
          type: string
          enum: [standard, satellite, hybrid, terrain]
          default: standard
        showGrid:
          type: boolean
          default: false
        showCounties:
          type: boolean
          default: false

    UserResponse:
      type: object
      required:
        - id
        - username
        - name
        - email
        - isSuperuser
        - isAnalyst
        - isOperationAdmin
        - mapType
        - showGrid
        - showCounties
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        departmentId:
          type: integer
          format: int64
          nullable: true
        isSuperuser:
          type: boolean
        isAnalyst:
          type: boolean
        isOperationAdmin:
          type: boolean
        mapType:
          type: string
          enum: [standard, satellite, hybrid, terrain]
        showGrid:
          type: boolean
        showCounties:
          type: boolean

    CellUpsertRequest:
      type: object
      required:
        - technology
        - azimuth
        - location
        - enbGnb
        - mccMnc
      properties:
        lacTac:
          type: string
          nullable: true
        ci:
          type: string
        eciNci:
          type: string
        cgi:
          type: string
        paragonCgi:
          type: string
        technology:
          type: integer
          enum: [2, 3, 4, 5, 10]
        azimuth:
          type: integer
          minimum: 0
          maximum: 360
        name:
          type: string
        location:
          $ref: '#/components/schemas/CellLocationRequest'
        enbGnb:
          $ref: '#/components/schemas/CellEnbGnbRequest'
        mccMnc:
          $ref: '#/components/schemas/CellMccMncRequest'
        band:
          $ref: '#/components/schemas/CellBandRequest'

    CellLocationRequest:
      type: object
      required:
        - latitude
        - longitude
        - zip4
        - zip3
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        address:
          type: string
        address1:
          type: string
        zip4:
          type: integer
        zip3:
          type: integer
        postalDesignation:
          type: string
        countyId:
          type: integer
          format: int64
          nullable: true

    CellEnbGnbRequest:
      type: object
      required:
        - enbGnb
      properties:
        enbGnb:
          type: integer

    CellMccMncRequest:
      type: object
      required:
        - mcc
        - mnc
      properties:
        mcc:
          type: integer
        mnc:
          type: integer
        type:
          type: string
        brand:
          type: string
        operatorName:
          type: string
        status:
          type: string
        bands:
          type: string
        notes:
          type: string
        countryId:
          type: string

    CellBandRequest:
      type: object
      properties:
        band:
          type: string
        bandwidth:
          type: number
          format: double
        uplinkFreq:
          type: number
          format: double
        downlinkFreq:
          type: number
          format: double
        earfcn:
          type: number
          format: double

    CellResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        lacTac:
          type: string
          nullable: true
        ci:
          type: string
          nullable: true
        eciNci:
          type: string
          nullable: true
        cgi:
          type: string
          nullable: true
        paragonCgi:
          type: string
          nullable: true
        technology:
          type: integer
        azimuth:
          type: integer
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        location:
          $ref: '#/components/schemas/CellLocationResponse'
        enbGnb:
          $ref: '#/components/schemas/CellEnbGnbResponse'
        mccMnc:
          $ref: '#/components/schemas/CellMccMncResponse'
        band:
          $ref: '#/components/schemas/CellBandResponse'
        polygonGeoJson:
          type: string
          nullable: true
        polygonShortGeoJson:
          type: string
          nullable: true

    CellLocationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        address:
          type: string
          nullable: true
        address1:
          type: string
          nullable: true
        zip4:
          type: integer
          nullable: true
        zip3:
          type: integer
          nullable: true
        postalDesignation:
          type: string
          nullable: true
        countyId:
          type: integer
          format: int64
          nullable: true

    CellEnbGnbResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        enbGnb:
          type: integer

    CellMccMncResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          nullable: true
        mcc:
          type: integer
        mnc:
          type: integer
        brand:
          type: string
          nullable: true
        operatorName:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        bands:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        countryId:
          type: string
          nullable: true

    CellBandResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        band:
          type: string
          nullable: true
        bandwidth:
          type: number
          format: double
          nullable: true
        uplinkFreq:
          type: number
          format: double
          nullable: true
        downlinkFreq:
          type: number
          format: double
          nullable: true
        earfcn:
          type: number
          format: double
          nullable: true

    NearbyCellsResponse:
      type: object
      required:
        - centralCell
        - cellsInRadius
      properties:
        centralCell:
          $ref: '#/components/schemas/CellResponse'
        cellsInRadius:
          type: array
          items:
            $ref: '#/components/schemas/CellResponse'

    CellCsvImportResponse:
      type: object
      required:
        - rowsProcessed
        - inserted
        - updated
        - polygonsUpserted
      properties:
        rowsProcessed:
          type: integer
        inserted:
          type: integer
        updated:
          type: integer
        polygonsUpserted:
          type: integer

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
